name: Dotfiles CI/CD

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run install script
      run: |
        chmod +x install.sh
        ./install.sh

    - name: Verify installed dotfiles are symlinks
      shell: bash
      run: |
        set -euo pipefail

        assert_link () {
          local target="$1"
          local expected="$2"

          if [ ! -e "$target" ]; then
            echo "Missing: $target"
            exit 1
          fi
          if [ ! -L "$target" ]; then
            echo "Not a symlink: $target"
            ls -la "$target" || true
            exit 1
          fi

          local resolved_target
          local resolved_expected
          resolved_target="$(readlink -f "$target")"
          resolved_expected="$(readlink -f "$expected")"

          if [ "$resolved_target" != "$resolved_expected" ]; then
            echo "Symlink mismatch for $target"
            echo "  expected -> $resolved_expected"
            echo "  actual   -> $resolved_target"
            exit 1
          fi
        }

        assert_link "$HOME/.gitconfig" "$GITHUB_WORKSPACE/git/.gitconfig"
        assert_link "$HOME/.npmrc" "$GITHUB_WORKSPACE/node/.npmrc"
        assert_link "$HOME/.ssh/config" "$GITHUB_WORKSPACE/ssh/config"
        assert_link "$HOME/.config/Code/User/settings.json" "$GITHUB_WORKSPACE/vscode/settings.json"
        assert_link "$HOME/.config/Cursor/User/settings.json" "$GITHUB_WORKSPACE/cursor/settings.json"

    - name: Show installed dotfiles (for debugging)
      run: |
        ls -la ~/
        ls -la ~/.config/Code/User/
        ls -la ~/.config/Cursor/User/
