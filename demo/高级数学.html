<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可调整画布 — 向量数学版</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --panel: #1c1e27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3dd68c;
    --text: #c9cdd8;
    --text-dim: #5c6070;
    --handle-size: 10px;
    --edge-size: 6px;
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── 顶部栏 ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header .sep { flex: 1; }
  header .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* ── 工作区 ── */
  #workspace {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-color: var(--bg);
  }
  /* 次级网格 */
  #workspace::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(rgba(42,45,58,.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,45,58,.4) 1px, transparent 1px);
    background-size: 8px 8px;
    pointer-events: none;
  }

  /* ── 画布盒子 ── */
  #canvas-box {
    position: absolute;
    top: 80px; left: 120px;
    width: 400px; height: 300px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 3px;
    box-shadow:
      0 0 0 1px rgba(79,142,247,.15),
      0 8px 40px rgba(0,0,0,.6),
      inset 0 0 80px rgba(79,142,247,.03);
    cursor: grab;
    touch-action: none;
  }
  #canvas-box.moving {
    cursor: grabbing;
    box-shadow:
      0 0 0 1px rgba(79,142,247,.4),
      0 20px 60px rgba(0,0,0,.8),
      inset 0 0 80px rgba(79,142,247,.06);
    transition: box-shadow .1s;
  }

  /* 内部尺寸标签 */
  #size-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: rgba(79,142,247,.25);
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: .04em;
    transition: color .15s;
  }
  #canvas-box.dragging #size-label { color: rgba(79,142,247,.55); }

  /* 画布内十字线 */
  #canvas-box::before,
  #canvas-box::after {
    content: '';
    position: absolute;
    background: rgba(79,142,247,.07);
    pointer-events: none;
  }
  #canvas-box::before { left: 50%; top: 0; bottom: 0; width: 1px; }
  #canvas-box::after  { top: 50%; left: 0; right: 0; height: 1px; }

  /* ── 把手通用 ── */
  .handle {
    position: absolute;
    z-index: 10;
    touch-action: none;
  }

  /* 角把手 */
  .handle.corner {
    width: var(--handle-size);
    height: var(--handle-size);
    background: var(--accent);
    border: 2px solid var(--bg);
    border-radius: 2px;
    box-shadow: 0 0 0 1px var(--accent);
    transition: transform .12s, background .12s, box-shadow .12s;
  }
  .handle.corner:hover,
  .handle.corner.active {
    background: #fff;
    transform: scale(1.5);
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent);
  }
  .handle.tl { top: 0; left: 0; transform-origin: top left; cursor: nwse-resize; }
  .handle.tr { top: 0; right: 0; transform-origin: top right; cursor: nesw-resize; }
  .handle.bl { bottom: 0; left: 0; transform-origin: bottom left; cursor: nesw-resize; }
  .handle.br { bottom: 0; right: 0; transform-origin: bottom right; cursor: nwse-resize; }
  .handle.tl { translate: -50% -50%; }
  .handle.tr { translate:  50% -50%; }
  .handle.bl { translate: -50%  50%; }
  .handle.br { translate:  50%  50%; }

  .handle.corner:hover { z-index: 20; }

  /* 边把手 */
  .handle.edge {
    background: var(--accent);
    border-radius: 99px;
    opacity: .55;
    transition: opacity .12s, transform .12s, box-shadow .12s;
  }
  .handle.edge:hover,
  .handle.edge.active {
    opacity: 1;
    box-shadow: 0 0 10px var(--accent);
  }
  .handle.top, .handle.bottom {
    height: var(--edge-size);
    width: 40%;
    left: 30%;
    cursor: ns-resize;
  }
  .handle.left, .handle.right {
    width: var(--edge-size);
    height: 40%;
    top: 30%;
    cursor: ew-resize;
  }
  .handle.top    { top: 0; translate: 0 -50%; }
  .handle.bottom { bottom: 0; translate: 0 50%; }
  .handle.left   { left: 0; translate: -50% 0; }
  .handle.right  { right: 0; translate: 50% 0; }

  .handle.top:hover, .handle.top.active,
  .handle.bottom:hover, .handle.bottom.active {
    transform: scaleY(1.8);
  }
  .handle.left:hover, .handle.left.active,
  .handle.right:hover, .handle.right.active {
    transform: scaleX(1.8);
  }

  /* ── 坐标标注线 ── */
  .ruler-x, .ruler-y {
    position: absolute;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    opacity: .5;
  }
  .ruler-x {
    border-top: 1px dashed rgba(79,142,247,.3);
    top: 50%; left: 0; right: 0;
    height: 0;
  }
  .ruler-y {
    border-left: 1px dashed rgba(79,142,247,.3);
    left: 50%; top: 0; bottom: 0;
    width: 0;
  }

  /* ── 底部信息面板 ── */
  footer {
    flex-shrink: 0;
    height: 40px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    overflow: hidden;
  }
  .info-cell {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 18px;
    height: 100%;
    border-right: 1px solid var(--border);
  }
  .info-cell .lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .info-cell .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    min-width: 80px;
  }
  .info-cell .val span { color: var(--text-dim); font-weight: 400; }

  .hint {
    margin-left: auto;
    padding: 0 18px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .3; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">Canvas · Resize</span>
  <span class="sep"></span>
  <span class="badge">拖拽画布移动 · 拖拽边 / 角 调整尺寸</span>
</header>

<div id="workspace">
  <div id="canvas-box">
    <!-- 把手：四角 -->
    <div class="handle corner tl" data-dir="tl"></div>
    <div class="handle corner tr" data-dir="tr"></div>
    <div class="handle corner bl" data-dir="bl"></div>
    <div class="handle corner br" data-dir="br"></div>
    <!-- 把手：四边 -->
    <div class="handle edge top"    data-dir="t"></div>
    <div class="handle edge bottom" data-dir="b"></div>
    <div class="handle edge left"   data-dir="l"></div>
    <div class="handle edge right"  data-dir="r"></div>

    <div id="size-label">400 × 300</div>
  </div>
</div>

<footer>
  <div class="info-cell">
    <span class="lbl">宽度</span>
    <span class="val" id="info-w">400 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">高度</span>
    <span class="val" id="info-h">300 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">X 位置</span>
    <span class="val" id="info-x">120 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">Y 位置</span>
    <span class="val" id="info-y">80 <span>px</span></span>
  </div>
  <span class="hint"><span class="dot"></span>最小尺寸 50 × 50 px</span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════
//  Vec2 — 不可变二维向量，提供完整线性代数运算
// ═══════════════════════════════════════════════════════════
class Vec2 {
  constructor(x = 0, y = 0) { this.x = x; this.y = y; }

  add(v)   { return new Vec2(this.x + v.x, this.y + v.y); }
  sub(v)   { return new Vec2(this.x - v.x, this.y - v.y); }
  scale(s) { return new Vec2(this.x * s, this.y * s); }
  neg()    { return new Vec2(-this.x, -this.y); }
  had(v)   { return new Vec2(this.x * v.x, this.y * v.y); }
  max(v)   { return new Vec2(Math.max(this.x, v.x), Math.max(this.y, v.y)); }
  min(v)   { return new Vec2(Math.min(this.x, v.x), Math.min(this.y, v.y)); }
  round()  { return new Vec2(Math.round(this.x), Math.round(this.y)); }
  dot(v)   { return this.x * v.x + this.y * v.y; }
  len()    { return Math.hypot(this.x, this.y); }
  eq(v)    { return this.x === v.x && this.y === v.y; }

  static of(x, y) { return new Vec2(x, y); }
  static ZERO = new Vec2(0, 0);
}

// ═══════════════════════════════════════════════════════════
//  Rect — 用 Vec2 对 (pos, size) 表示的不可变矩形
// ═══════════════════════════════════════════════════════════
class Rect {
  constructor(pos, size) { this.pos = pos; this.size = size; }

  get x() { return this.pos.x; }
  get y() { return this.pos.y; }
  get w() { return this.size.x; }
  get h() { return this.size.y; }

  moved(delta) {
    return new Rect(this.pos.add(delta).round(), this.size);
  }

  /**
   * 向量 resize 核心公式:
   *   newSize = max(minSize, snapSize + delta ⊙ signVec)
   *   newPos  = snapPos + (snapSize − newSize) ⊙ posVec
   *
   * signVec: delta 对 (w,h) 的系数 (+1 / -1 / 0)
   * posVec:  size 收缩时 position 跟随系数 (1 / 0)
   */
  resized(delta, signVec, posVec, minSize) {
    const newSize = this.size.add(delta.had(signVec)).max(minSize);
    const newPos  = this.pos.add(this.size.sub(newSize).had(posVec));
    return new Rect(newPos.round(), newSize.round());
  }
}

// ═══════════════════════════════════════════════════════════
//  方向签名表 — 两个 Vec2 编码 8 个 handle 方向
//
//  方向   signVec       posVec
//  ──────────────────────────────
//  br    (+1, +1)      (0, 0)
//  tl    (−1, −1)      (1, 1)
//  tr    (+1, −1)      (0, 1)
//  bl    (−1, +1)      (1, 0)
//  r     (+1,  0)      (0, 0)
//  l     (−1,  0)      (1, 0)
//  b     ( 0, +1)      (0, 0)
//  t     ( 0, −1)      (0, 1)
// ═══════════════════════════════════════════════════════════
const DIRS = {
  tl: { sign: Vec2.of(-1, -1), pos: Vec2.of(1, 1) },
  tr: { sign: Vec2.of(+1, -1), pos: Vec2.of(0, 1) },
  bl: { sign: Vec2.of(-1, +1), pos: Vec2.of(1, 0) },
  br: { sign: Vec2.of(+1, +1), pos: Vec2.of(0, 0) },
  t:  { sign: Vec2.of( 0, -1), pos: Vec2.of(0, 1) },
  b:  { sign: Vec2.of( 0, +1), pos: Vec2.of(0, 0) },
  l:  { sign: Vec2.of(-1,  0), pos: Vec2.of(1, 0) },
  r:  { sign: Vec2.of(+1,  0), pos: Vec2.of(0, 0) },
};

// ═══════════════════════════════════════════════════════════
//  统一指针抽象 — 从 mouse / touch / pointer 事件提取 Vec2
// ═══════════════════════════════════════════════════════════
function ptrPos(e) {
  const p = e.touches ? e.touches[0] : e;
  return Vec2.of(p.clientX, p.clientY);
}

// ═══════════════════════════════════════════════════════════
//  应用层
// ═══════════════════════════════════════════════════════════
const box       = document.getElementById('canvas-box');
const sizeLabel = document.getElementById('size-label');
const infoW     = document.getElementById('info-w');
const infoH     = document.getElementById('info-h');
const infoX     = document.getElementById('info-x');
const infoY     = document.getElementById('info-y');
const handles   = document.querySelectorAll('.handle');

const MIN_SIZE = Vec2.of(50, 50);

let state = new Rect(Vec2.of(120, 80), Vec2.of(400, 300));

// interaction: null | { type: 'move'|'resize', startPt, snap, dir?, handleEl? }
let interaction = null;

function applyState() {
  box.style.left   = state.x + 'px';
  box.style.top    = state.y + 'px';
  box.style.width  = state.w + 'px';
  box.style.height = state.h + 'px';
  sizeLabel.textContent = state.w + ' \u00d7 ' + state.h;
  infoW.innerHTML = state.w + ' <span>px</span>';
  infoH.innerHTML = state.h + ' <span>px</span>';
  infoX.innerHTML = state.x + ' <span>px</span>';
  infoY.innerHTML = state.y + ' <span>px</span>';
}

// ── onDown: 开始交互 ─────────────────────────────────────
function onMoveStart(e) {
  if (e.target !== box && e.target !== sizeLabel) return;
  e.preventDefault();
  interaction = { type: 'move', startPt: ptrPos(e), snap: state };
  box.classList.add('moving');
  document.body.style.cursor = 'grabbing';
}

function onResizeStart(e) {
  e.preventDefault();
  e.stopPropagation();
  const el  = e.currentTarget;
  const dir = el.dataset.dir;
  interaction = { type: 'resize', startPt: ptrPos(e), snap: state, dir, handleEl: el };
  el.classList.add('active');
  box.classList.add('dragging');
  document.body.style.cursor = getComputedStyle(el).cursor;
}

// ── onMove: 向量公式一行搞定 ─────────────────────────────
function onPointerMove(e) {
  if (!interaction) return;
  e.preventDefault();
  const delta = ptrPos(e).sub(interaction.startPt);

  if (interaction.type === 'move') {
    state = interaction.snap.moved(delta);
  } else {
    const { sign, pos } = DIRS[interaction.dir];
    state = interaction.snap.resized(delta, sign, pos, MIN_SIZE);
  }
  applyState();
}

// ── onUp: 结束交互 ───────────────────────────────────────
function onPointerUp() {
  if (!interaction) return;
  if (interaction.type === 'move') {
    box.classList.remove('moving');
  } else {
    if (interaction.handleEl) interaction.handleEl.classList.remove('active');
    box.classList.remove('dragging');
  }
  document.body.style.cursor = '';
  interaction = null;
}

// ── 绑定事件：鼠标 + 触摸统一走同一套 handler ─────────────
box.addEventListener('mousedown', onMoveStart);
box.addEventListener('touchstart', onMoveStart, { passive: false });

handles.forEach(el => {
  el.addEventListener('mousedown', onResizeStart);
  el.addEventListener('touchstart', onResizeStart, { passive: false });
});

document.addEventListener('mousemove', onPointerMove);
document.addEventListener('touchmove', onPointerMove, { passive: false });

document.addEventListener('mouseup', onPointerUp);
document.addEventListener('touchend', onPointerUp);

applyState();
</script>
</body>
</html>
