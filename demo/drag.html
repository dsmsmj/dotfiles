<!DOCTYPE html>
<html>

<head>
    <style>
        #box {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 200px;
            height: 200px;
            background-color: red;
            cursor: move;
        }

        .resizeButton {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: white;
            border: 1px solid black;
            cursor: nwse-resize;
        }

        #resizeButtonTopLeft {
            top: -5px;
            left: -5px;
            cursor: nwse-resize;
        }

        #resizeButtonTopRight {
            top: -5px;
            right: -5px;
            cursor: nesw-resize;
        }

        #resizeButtonBottomLeft {
            bottom: -5px;
            left: -5px;
            cursor: nesw-resize;
        }

        #resizeButtonBottomRight {
            bottom: -5px;
            right: -5px;
            cursor: nwse-resize;
        }
    </style>
</head>

<body>
    <div id="box">
        <div data-type="resizeButtonTopLeft" id="resizeButtonTopLeft" class="resizeButton"></div>
        <div data-type="resizeButtonTopRight" id="resizeButtonTopRight" class="resizeButton"></div>
        <div data-type="resizeButtonBottomLeft" id="resizeButtonBottomLeft" class="resizeButton"></div>
        <div data-type="resizeButtonBottomRight" id="resizeButtonBottomRight" class="resizeButton"></div>
    </div>

    <script>
        const box = document.querySelector("#box");
        const resizeButtons = document.querySelectorAll(".resizeButton");
        let isDragging = false;
        let isResizing = false;
        let lastX = 0;
        let lastY = 0;
        let lastWidth = 0;
        let lastHeight = 0;
        let dataType = '';

        box.addEventListener("mousedown", (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        resizeButtons.forEach((resizeButton) => {

            resizeButton.addEventListener("mousedown", (e) => {
                console.log(e.target.dataset.type);
                e.stopPropagation()
                dataType = e.target.dataset.type
                isResizing = true;
                lastX = e.clientX;
                lastY = e.clientY;
                lastWidth = parseInt(
                    window.getComputedStyle(box).getPropertyValue("width")
                );
                lastHeight = parseInt(
                    window.getComputedStyle(box).getPropertyValue("height")
                );
            });
        });

        document.addEventListener("mousemove", (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;
                isResizingTopLeft = true
                const boxX = parseInt(
                    window.getComputedStyle(box).getPropertyValue("left")
                );
                const boxY = parseInt(
                    window.getComputedStyle(box).getPropertyValue("top")
                );
                box.style.left = boxX + deltaX + "px";
                box.style.top = boxY + deltaY + "px";
                lastX = e.clientX;
                lastY = e.clientY;
            } else if (isResizing) {
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;
                const offsetWidth = box.offsetWidth;
                const offsetHeight = box.offsetHeight;
                const offsetLeft = box.offsetLeft;
                const offsetTop = box.offsetTop;
                if (dataType == 'resizeButtonTopLeft') {
                    box.style.width = offsetWidth - deltaX + "px";
                    box.style.height = offsetHeight - deltaY + "px";
                    box.style.left = offsetLeft + deltaX + "px";
                    box.style.top = offsetTop + deltaY + "px";
                } else if (dataType == 'resizeButtonTopRight') {
                    box.style.width = offsetWidth + deltaX + "px";
                    box.style.height = offsetHeight - deltaY + "px";
                    box.style.top = offsetTop + deltaY + "px";
                } else if (dataType == 'resizeButtonBottomLeft') {
                    box.style.width = offsetWidth - deltaX + "px";
                    box.style.height = offsetHeight + deltaY + "px";
                    box.style.left = offsetLeft + deltaX + "px";
                } else if (dataType == 'resizeButtonBottomRight') {
                    box.style.width = offsetWidth + deltaX + "px";
                    box.style.height = offsetHeight + deltaY + "px";
                }
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            isResizing = false;
        });
    </script>
</body>

</html>
