<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可调整画布</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --panel: #1c1e27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3dd68c;
    --text: #c9cdd8;
    --text-dim: #5c6070;
    --handle-size: 10px;
    --edge-size: 6px;
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── 顶部栏 ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header .sep { flex: 1; }
  header .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* ── 工作区 ── */
  #workspace {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-color: var(--bg);
  }
  /* 次级网格 */
  #workspace::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(rgba(42,45,58,.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,45,58,.4) 1px, transparent 1px);
    background-size: 8px 8px;
    pointer-events: none;
  }

  /* ── 画布盒子 ── */
  #canvas-box {
    position: absolute;
    top: 80px; left: 120px;
    width: 400px; height: 300px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 3px;
    box-shadow:
      0 0 0 1px rgba(79,142,247,.15),
      0 8px 40px rgba(0,0,0,.6),
      inset 0 0 80px rgba(79,142,247,.03);
    cursor: grab;
  }
  #canvas-box.moving {
    cursor: grabbing;
    box-shadow:
      0 0 0 1px rgba(79,142,247,.4),
      0 20px 60px rgba(0,0,0,.8),
      inset 0 0 80px rgba(79,142,247,.06);
    transition: box-shadow .1s;
  }

  /* 内部尺寸标签 */
  #size-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: rgba(79,142,247,.25);
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: .04em;
    transition: color .15s;
  }
  #canvas-box.dragging #size-label { color: rgba(79,142,247,.55); }

  /* 画布内十字线 */
  #canvas-box::before,
  #canvas-box::after {
    content: '';
    position: absolute;
    background: rgba(79,142,247,.07);
    pointer-events: none;
  }
  #canvas-box::before { left: 50%; top: 0; bottom: 0; width: 1px; }
  #canvas-box::after  { top: 50%; left: 0; right: 0; height: 1px; }

  /* ── 把手通用 ── */
  .handle {
    position: absolute;
    z-index: 10;
  }

  /* 角把手 */
  .handle.corner {
    width: var(--handle-size);
    height: var(--handle-size);
    background: var(--accent);
    border: 2px solid var(--bg);
    border-radius: 2px;
    box-shadow: 0 0 0 1px var(--accent);
    transition: transform .12s, background .12s, box-shadow .12s;
  }
  .handle.corner:hover,
  .handle.corner.active {
    background: #fff;
    transform: scale(1.5);
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent);
  }
  .handle.tl { top: 0; left: 0; transform-origin: top left; cursor: nwse-resize; }
  .handle.tr { top: 0; right: 0; transform-origin: top right; cursor: nesw-resize; }
  .handle.bl { bottom: 0; left: 0; transform-origin: bottom left; cursor: nesw-resize; }
  .handle.br { bottom: 0; right: 0; transform-origin: bottom right; cursor: nwse-resize; }
  .handle.tl { translate: -50% -50%; }
  .handle.tr { translate:  50% -50%; }
  .handle.bl { translate: -50%  50%; }
  .handle.br { translate:  50%  50%; }

  .handle.corner:hover { z-index: 20; }

  /* 边把手 */
  .handle.edge {
    background: var(--accent);
    border-radius: 99px;
    opacity: .55;
    transition: opacity .12s, transform .12s, box-shadow .12s;
  }
  .handle.edge:hover,
  .handle.edge.active {
    opacity: 1;
    box-shadow: 0 0 10px var(--accent);
  }
  .handle.top, .handle.bottom {
    height: var(--edge-size);
    width: 40%;
    left: 30%;
    cursor: ns-resize;
  }
  .handle.left, .handle.right {
    width: var(--edge-size);
    height: 40%;
    top: 30%;
    cursor: ew-resize;
  }
  .handle.top    { top: 0; translate: 0 -50%; }
  .handle.bottom { bottom: 0; translate: 0 50%; }
  .handle.left   { left: 0; translate: -50% 0; }
  .handle.right  { right: 0; translate: 50% 0; }

  .handle.top:hover, .handle.top.active,
  .handle.bottom:hover, .handle.bottom.active {
    transform: scaleY(1.8);
  }
  .handle.left:hover, .handle.left.active,
  .handle.right:hover, .handle.right.active {
    transform: scaleX(1.8);
  }

  /* ── 坐标标注线 ── */
  .ruler-x, .ruler-y {
    position: absolute;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    opacity: .5;
  }
  .ruler-x {
    border-top: 1px dashed rgba(79,142,247,.3);
    top: 50%; left: 0; right: 0;
    height: 0;
  }
  .ruler-y {
    border-left: 1px dashed rgba(79,142,247,.3);
    left: 50%; top: 0; bottom: 0;
    width: 0;
  }

  /* ── 底部信息面板 ── */
  footer {
    flex-shrink: 0;
    height: 40px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    overflow: hidden;
  }
  .info-cell {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 18px;
    height: 100%;
    border-right: 1px solid var(--border);
  }
  .info-cell .lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .info-cell .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    min-width: 80px;
  }
  .info-cell .val span { color: var(--text-dim); font-weight: 400; }

  .hint {
    margin-left: auto;
    padding: 0 18px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .3; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">Canvas · Resize</span>
  <span class="sep"></span>
  <span class="badge">拖拽画布移动 · 拖拽边 / 角 调整尺寸</span>
</header>

<div id="workspace">
  <div id="canvas-box">
    <!-- 把手：四角 -->
    <div class="handle corner tl" data-dir="tl"></div>
    <div class="handle corner tr" data-dir="tr"></div>
    <div class="handle corner bl" data-dir="bl"></div>
    <div class="handle corner br" data-dir="br"></div>
    <!-- 把手：四边 -->
    <div class="handle edge top"    data-dir="t"></div>
    <div class="handle edge bottom" data-dir="b"></div>
    <div class="handle edge left"   data-dir="l"></div>
    <div class="handle edge right"  data-dir="r"></div>

    <div id="size-label">400 × 300</div>
  </div>
</div>

<footer>
  <div class="info-cell">
    <span class="lbl">宽度</span>
    <span class="val" id="info-w">400 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">高度</span>
    <span class="val" id="info-h">300 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">X 位置</span>
    <span class="val" id="info-x">120 <span>px</span></span>
  </div>
  <div class="info-cell">
    <span class="lbl">Y 位置</span>
    <span class="val" id="info-y">80 <span>px</span></span>
  </div>
  <span class="hint"><span class="dot"></span>最小尺寸 50 × 50 px</span>
</footer>

<script>
const box = document.getElementById('canvas-box');
const ws  = document.getElementById('workspace');
const sizeLabel = document.getElementById('size-label');
const infoW = document.getElementById('info-w');
const infoH = document.getElementById('info-h');
const infoX = document.getElementById('info-x');
const infoY = document.getElementById('info-y');

const MIN = 50;

// 状态
let state = {
  x: 120, y: 80, w: 400, h: 300
};

function applyState() {
  box.style.left   = state.x + 'px';
  box.style.top    = state.y + 'px';
  box.style.width  = state.w + 'px';
  box.style.height = state.h + 'px';
  const wTxt = state.w + ' × ' + state.h;
  sizeLabel.textContent = wTxt;
  infoW.innerHTML = state.w + ' <span>px</span>';
  infoH.innerHTML = state.h + ' <span>px</span>';
  infoX.innerHTML = state.x + ' <span>px</span>';
  infoY.innerHTML = state.y + ' <span>px</span>';
}

// 拖拽逻辑
let drag = null; // { dir, startX, startY, snap }
let move = null; // { startX, startY, snapX, snapY }

// ── 移动：按住画布本体拖拽 ──
box.addEventListener('mousedown', e => {
  if (e.target !== box && e.target !== sizeLabel) return; // 只响应本体
  e.preventDefault();
  move = { startX: e.clientX, startY: e.clientY, snapX: state.x, snapY: state.y };
  box.classList.add('moving');
  document.body.style.cursor = 'grabbing';
});

box.addEventListener('touchstart', e => {
  if (e.target !== box && e.target !== sizeLabel) return;
  e.preventDefault();
  const t = e.touches[0];
  move = { startX: t.clientX, startY: t.clientY, snapX: state.x, snapY: state.y };
  box.classList.add('moving');
}, { passive: false });

document.querySelectorAll('.handle').forEach(el => {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    const dir = el.dataset.dir;
    drag = {
      dir,
      startX: e.clientX,
      startY: e.clientY,
      snap: { ...state }
    };
    el.classList.add('active');
    box.classList.add('dragging');
    document.body.style.cursor = el.style.cursor || getComputedStyle(el).cursor;
  });
});

document.addEventListener('mousemove', e => {
  // 移动
  if (move) {
    state.x = Math.round(move.snapX + e.clientX - move.startX);
    state.y = Math.round(move.snapY + e.clientY - move.startY);
    applyState();
    return;
  }
  if (!drag) return;
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  const s  = drag.snap;
  let { x, y, w, h } = s;

  const dir = drag.dir;

  // 右边 / 右
  if (dir.includes('r') || dir === 'r') {
    w = Math.max(MIN, s.w + dx);
  }
  // 左边 / 左
  if (dir.includes('l') || dir === 'l') {
    const newW = Math.max(MIN, s.w - dx);
    x = s.x + (s.w - newW);
    w = newW;
  }
  // 下边 / 下
  if (dir.includes('b') || dir === 'b') {
    h = Math.max(MIN, s.h + dy);
  }
  // 上边 / 上
  if (dir.includes('t') || dir === 't') {
    const newH = Math.max(MIN, s.h - dy);
    y = s.y + (s.h - newH);
    h = newH;
  }

  state = { x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h) };
  applyState();
});

document.addEventListener('mouseup', () => {
  if (move) {
    move = null;
    box.classList.remove('moving');
    document.body.style.cursor = '';
    return;
  }
  if (!drag) return;
  document.querySelectorAll('.handle').forEach(el => el.classList.remove('active'));
  box.classList.remove('dragging');
  document.body.style.cursor = '';
  drag = null;
});

// 触摸支持
document.querySelectorAll('.handle').forEach(el => {
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const dir = el.dataset.dir;
    drag = { dir, startX: t.clientX, startY: t.clientY, snap: { ...state } };
    el.classList.add('active');
    box.classList.add('dragging');
  }, { passive: false });
});
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (move) {
    e.preventDefault();
    state.x = Math.round(move.snapX + t.clientX - move.startX);
    state.y = Math.round(move.snapY + t.clientY - move.startY);
    applyState();
    return;
  }
  if (!drag) return;
  e.preventDefault();
  const fakeE = { clientX: t.clientX, clientY: t.clientY };
  // reuse mouse handler logic inline
  const dx = fakeE.clientX - drag.startX;
  const dy = fakeE.clientY - drag.startY;
  const s  = drag.snap;
  let { x, y, w, h } = s;
  const dir = drag.dir;
  if (dir.includes('r') || dir === 'r') w = Math.max(MIN, s.w + dx);
  if (dir.includes('l') || dir === 'l') { const nw = Math.max(MIN, s.w - dx); x = s.x+(s.w-nw); w = nw; }
  if (dir.includes('b') || dir === 'b') h = Math.max(MIN, s.h + dy);
  if (dir.includes('t') || dir === 't') { const nh = Math.max(MIN, s.h - dy); y = s.y+(s.h-nh); h = nh; }
  state = { x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h) };
  applyState();
}, { passive: false });
document.addEventListener('touchend', () => {
  if (move) { move = null; box.classList.remove('moving'); return; }
  if (!drag) return;
  document.querySelectorAll('.handle').forEach(el => el.classList.remove('active'));
  box.classList.remove('dragging');
  drag = null;
});

applyState();
</script>
</body>
</html>
